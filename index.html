<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Mohsen Zamani (mohsenzamanist)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <header class="controls">
      <div class="show-header hidden" id="show-header">
        <span>Filtering for: </span>
        <input type="text" id="search-show" placeholder="Search shows..." />
        <span id="found-shows"></span>
      </div>
      <div class="episode-header hidden" id="episode-header">
        <p id="back-to-shows">&larr;Back</p>
        <select id="show-select">
          <option value="">Select a show...</option>
        </select>
        <select id="episode-select">
          <option value="all">All episodes</option>
        </select>
        <input type="text" id="search-input" placeholder="Search episodes..." />
        <span id="search-stats"></span>
      </div>
    </header>

    <main id="root">
      <section class="show-view hidden" id="show-view"></section>
      <section class="episode-view hidden" id="episode-view"></section>
    </main>

    <template id="show-card-template">
      <section class="show-card">
        <h1></h1>
        <div>
          <img src="" alt="" />
          <p id="summary" class="show-summary"></p>
          <!-- <a href="" target="_blank">View on TVMaze</a> -->
          <div>
            <p id="rated"><b>Rated: </b></p>
            <p id="genres"><b>Genres: </b></p>
            <p id="status"><b>Status: </b></p>
            <p id="runtime"><b>Runtime: </b></p>
          </div>
        </div>
      </section>
    </template>
    <template id="episode-card-template">
      <section class="episode-card">
        <h3></h3>
        <img src="" alt="" />
        <p></p>
        <a href="" target="_blank">View on TVMaze</a>
      </section>
    </template>

    <script src="allEpisodes.js"></script>
    <script src="script.js"></script>
  </body>
</html>
